name: Tests

# Roda a suíte pytest a cada push no main e em pull requests.
# (Como o restante do CI, fica pronto e passa a rodar quando o billing do Actions
#  for regularizado. Localmente: python -m pytest)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencias de sistema do Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Instalar dependencias
        run: |
          python -m pip install -r build_tools/requirements-build.lock.txt
          python -m pip install -r requirements-dev.txt

      - name: Rodar testes
        run: python -m pytest
