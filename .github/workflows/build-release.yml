name: Build & Release (Windows, Linux, macOS)

# Dispara:
#  - ao enviar uma tag vX.Y.Z  -> compila nos 3 SOs e PUBLICA um Release com:
#       Windows: instalador (.exe) + .zip portatil
#       Linux:   .tar.gz portatil
#       macOS:   .zip portatil
#  - manualmente (Actions > Run workflow) -> compila e sobe os artifacts (sem release)
#
# OBS.: o PyInstaller NAO faz cross-compile; por isso cada SO compila no seu runner.
# Este workflow ficou pronto/"engatilhado" e passa a valer assim que o billing do
# GitHub Actions for regularizado (Settings > Billing). O caminho local comprovado
# continua sendo build_tools/release.py (Windows).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # necessario para criar Releases

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: build_tools/requirements-build.lock.txt

      - name: Dependencias de sistema do Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0

      - name: Instalar dependencias (lock)
        run: python -m pip install -r build_tools/requirements-build.lock.txt

      - name: Compilar (build + selftest headless)
        run: python build_tools/build_clean.py --allow-any-venv

      # ---------------- Windows: instalador + zip ----------------
      - name: Instalar Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Empacotar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Get-Content VERSION -Raw).Trim()
          New-Item -ItemType Directory -Force release-assets | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build_tools\MatFinder.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC falhou ($LASTEXITCODE)" }
          Copy-Item "dist/installer/MatFinder-$ver-Setup.exe" release-assets/
          Compress-Archive -Path dist/MatFinder -DestinationPath "release-assets/MatFinder-$ver-win64.zip" -Force

      # ---------------- Linux: tar.gz portatil ----------------
      - name: Empacotar (Linux)
        if: runner.os == 'Linux'
        run: |
          ver=$(tr -d '[:space:]' < VERSION)
          mkdir -p release-assets
          tar -C dist -czf "release-assets/MatFinder-$ver-linux-x86_64.tar.gz" MatFinder

      # ---------------- macOS: zip portatil ----------------
      - name: Empacotar (macOS)
        if: runner.os == 'macOS'
        run: |
          ver=$(tr -d '[:space:]' < VERSION)
          mkdir -p release-assets
          (cd dist && zip -r -q "../release-assets/MatFinder-$ver-macos-arm64.zip" MatFinder)

      - name: Subir artifacts (sempre)
        uses: actions/upload-artifact@v4
        with:
          name: MatFinder-${{ matrix.os }}
          path: release-assets/*
          retention-days: 14

      - name: Publicar/atualizar Release (somente em tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          body: |
            Build automatico do MatFinder.

            Downloads:
            - **Windows**: instalador `*-Setup.exe` (recomendado) ou `*-win64.zip` portatil.
            - **Linux**: `*-linux-x86_64.tar.gz` (extrair e rodar `MatFinder/MatFinder`).
            - **macOS**: `*-macos-arm64.zip` (extrair e rodar `MatFinder/MatFinder`).

            Rodar de fonte funciona em qualquer SO. Veja o CHANGELOG.md.
